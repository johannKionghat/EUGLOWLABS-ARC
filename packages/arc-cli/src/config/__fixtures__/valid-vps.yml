# Full VPS config — provider, projects, ollama models, R2 backups.
project: johann-stack
target: vps
domain: mondomaine.dev
email: johann@mondomaine.dev

provider:
  name: hetzner
  plan: cx32
  location: fsn1
  ssh_key: ~/.ssh/id_ed25519.pub

dns:
  provider: cloudflare
  zone: mondomaine.dev
  api_token: cf-token-placeholder
  tunnel: false

stack:
  paas: coolify
  ai_stack: true
  sandbox: true
  monitoring: uptime-kuma

backups:
  enabled: true
  schedule: "0 2 * * *"
  retention_days: 7
  remote:
    provider: r2
    bucket: mondomaine-backups

services:
  ollama:
    models:
      - mistral:7b
      - nomic-embed-text

projects:
  - name: euglow
    repo: github.com/johann/euglow
    subdomain: euglow
    branch: main
  - name: infinixui
    repo: github.com/johann/infinixui
    subdomain: infinixui
    branch: main
