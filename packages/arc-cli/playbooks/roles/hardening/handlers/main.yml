---
# Hardening role — handlers.
# UFW reload added in sub-task 2. fail2ban + sshd handlers added in sub-task 3.

- name: Reload ufw
  community.general.ufw:
    state: reloaded
  listen: reload ufw

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  listen: restart fail2ban

- name: Reload sshd
  ansible.builtin.service:
    name: ssh
    state: reloaded
  listen: reload sshd
