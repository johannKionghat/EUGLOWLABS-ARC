---
# ARC setup playbook — Phase 1.5 (PARTIAL).
#
# Status:
#   ANSIBLE-001a (livré)              : `hardening`, `docker`
#   ANSIBLE-001b (livré)              : `coolify`, `ai-stack`
#   ANSIBLE-001c sub-task 1 (livré)   : `sandbox` (3 networks ADR-0008)
# Rôles à venir :
#   - 001c sub-task 2 : `backups` (rclone + cron + R2 crypt remote)
#
# Run model (ADR-0012) : single-machine, executed in `localhost` by the user
# running `arc setup --apply`. Privilege escalation is global to the play
# because both 001a roles are 100% root-scoped (/etc/ufw, /etc/fail2ban,
# /etc/ssh, install Docker).
#
# Idempotence (ADR-0011 §A4) : every role MUST report `changed=0` on second run.
# state.json is NOT touched here; the CLI's `applyStack` writes it after
# the playbook returns 0 (cf. INSTALL-002 transactional contract).

- name: ARC setup — single-machine install
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  pre_tasks:
    - name: Assert Debian-family distribution
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >-
          ARC setup currently supports only Debian-family distributions
          (Ubuntu / Debian). Detected: {{ ansible_distribution }}
          {{ ansible_distribution_version }} ({{ ansible_os_family }}).
        success_msg: >-
          Detected {{ ansible_distribution }} {{ ansible_distribution_version }}
          ({{ ansible_os_family }}) — supported.

    - name: Warn if not Ubuntu 24.04 (primary target)
      ansible.builtin.debug:
        msg: >-
          ⚠️  Detected {{ ansible_distribution }} {{ ansible_distribution_version }}.
          ARC's primary target (ADR-0011 §A3) is Ubuntu 24.04. Other Debian-family
          distros are best-effort. Report issues at github.com/euglowlabs/arc/issues.
      when: >-
        ansible_distribution != "Ubuntu"
        or ansible_distribution_version is not search("^24\\.04")

  roles:
    - hardening
    - docker
    - coolify
    - ai-stack
    - sandbox
