name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0). Must be an existing tag.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build linux binaries + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so build-binaries.mjs's `git rev-parse --short
          # HEAD` resolves correctly (DIST-001 1a-3 — __ARC_GIT_SHA__).
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        # Unifies the two trigger sources :
        #   - push tag         → github.ref_name (e.g. "v0.1.0")
        #   - workflow_dispatch → github.event.inputs.tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pre-flight — fail fast if anything is broken before we burn
      # CI time on the binary build (~60s). Order : lint (fastest) →
      # typecheck → test → build. Manifest generation is implicit via
      # pretypecheck / pretest / prebuild hooks (DIST-001 1a-2).
      - name: Pre-flight — lint
        run: pnpm lint

      - name: Pre-flight — typecheck
        run: pnpm typecheck

      - name: Pre-flight — test
        run: pnpm test

      - name: Build packages
        run: pnpm build

      # build-binaries.mjs cross-compiles 5 targets (linux x64/arm64,
      # darwin x64/arm64, windows x64) via bun --target. Only the two
      # linux binaries are uploaded (DIST-001 §D-DIST-4 — MVP scope).
      # darwin/windows are tracked as DIST-004 backlog. The full cross
      # build runs anyway (~30 s) to keep build-binaries.mjs as a single
      # source of truth — its --define version-injection logic is
      # exercised on every CI run.
      - name: Build single binaries (cross-compile)
        run: pnpm --filter @euglowlabs/arc-cli build:bin

      - name: Generate SHA256 checksums (linux x64+arm64 only)
        working-directory: packages/arc-cli/bin
        run: |
          sha256sum arc-linux-x64   > arc-linux-x64.sha256
          sha256sum arc-linux-arm64 > arc-linux-arm64.sha256
          echo "--- SHA256 ---"
          cat arc-linux-x64.sha256
          cat arc-linux-arm64.sha256

      - name: Create GitHub Release + upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          # Tag suffix triggers GitHub "pre-release" flag (won't move
          # the "Latest" pointer). Covers the standard SemVer prerelease
          # identifiers used by changesets / release-please.
          prerelease: >-
            ${{
              contains(steps.tag.outputs.value, '-rc')
              || contains(steps.tag.outputs.value, '-beta')
              || contains(steps.tag.outputs.value, '-alpha')
            }}
          fail_on_unmatched_files: true
          files: |
            packages/arc-cli/bin/arc-linux-x64
            packages/arc-cli/bin/arc-linux-arm64
            packages/arc-cli/bin/arc-linux-x64.sha256
            packages/arc-cli/bin/arc-linux-arm64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
